---
- name: Install common packages
  ansible.builtin.package:
    name: "{{ common_packages }}"
    state: present

- name: Configure NTP
  ansible.builtin.template:
    src: ntp.conf.j2
    dest: /etc/ntp.conf
    mode: "0644"
  when: ntp_enabled
  notify: restart ntp

- name: Ensure NTP service
  ansible.builtin.service:
    name: ntpd
    state: started
    enabled: true
  when: ntp_enabled
