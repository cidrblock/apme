syntax = "proto3";

package apme.v1;

import "apme/v1/common.proto";

// CacheMaintainer populates the collection cache (Galaxy + GitHub); scales independently.
service CacheMaintainer {
  rpc PullGalaxy(PullGalaxyRequest) returns (PullGalaxyResponse);
  rpc PullRequirements(PullRequirementsRequest) returns (PullRequirementsResponse);
  rpc CloneOrg(CloneOrgRequest) returns (CloneOrgResponse);
  rpc Health(HealthRequest) returns (HealthResponse);
}

message PullGalaxyRequest {
  string spec = 1;
  string galaxy_server = 2;
}

message PullGalaxyResponse {
  bool success = 1;
  string path = 2;
  string error_message = 3;
}

message PullRequirementsRequest {
  string requirements_path = 1;
  string galaxy_server = 2;
}

message PullRequirementsResponse {
  bool success = 1;
  repeated string paths = 2;
  string error_message = 3;
}

message CloneOrgRequest {
  string org = 1;
  repeated string repos = 2;
  int32 depth = 3;
  string token = 4;
}

message CloneOrgResponse {
  bool success = 1;
  repeated string paths = 2;
  string error_message = 3;
}
