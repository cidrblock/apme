syntax = "proto3";

package apme.v1;

// Violation is the shared shape for a single lint/policy violation.
message Violation {
  string rule_id = 1;
  string level = 2;
  string message = 3;
  string file = 4;
  oneof line_oneof {
    int32 line = 5;
    LineRange line_range = 6;
  }
  string path = 7;
}

message LineRange {
  int32 start = 1;
  int32 end = 2;
}

// File represents one file in a chunked filesystem (path relative to project root, content).
message File {
  string path = 1;
  bytes content = 2;
}

// Health check (used by Primary, Ansible, CacheMaintainer).
message HealthRequest {}

message HealthResponse {
  string status = 1;  // "ok" or error description
}
