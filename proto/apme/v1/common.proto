syntax = "proto3";

package apme.v1;

// Violation is the shared shape for a single lint/policy violation.
message Violation {
  string rule_id = 1;
  string level = 2;
  string message = 3;
  string file = 4;
  oneof line_oneof {
    int32 line = 5;
    LineRange line_range = 6;
  }
  string path = 7;
}

message LineRange {
  int32 start = 1;
  int32 end = 2;
}

// File represents one file in a chunked filesystem (path relative to project root, content).
message File {
  string path = 1;
  bytes content = 2;
}

// Health check (used by Primary, Ansible, CacheMaintainer).
message HealthRequest {}

message HealthResponse {
  string status = 1;  // "ok" or error description
}

// Diagnostics — always collected, displayed with -v / -vv.
message RuleTiming {
  string rule_id = 1;
  double elapsed_ms = 2;
  int32  violations = 3;
}

message ValidatorDiagnostics {
  string validator_name = 1;
  string request_id = 2;
  double total_ms = 3;
  int32  files_received = 4;
  int32  violations_found = 5;
  repeated RuleTiming rule_timings = 6;
  map<string, string> metadata = 7;
}
